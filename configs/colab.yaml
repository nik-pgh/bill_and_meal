environment: colab

data:
  receipts_dir: /content/drive/MyDrive/bill_and_meal/receipts
  manifest_path: /content/drive/MyDrive/bill_and_meal/manifest.jsonl
  labeled_path: /content/drive/MyDrive/bill_and_meal/labeled_dataset.jsonl

teacher:
  model: claude-sonnet-4-20250514
  max_tokens: 2000
  rate_limit_delay: 1.2

student:
  # E2B fits comfortably on T4 free-tier (16GB VRAM). E4B's raw weights are
  # ~8B params — 4-bit quantized base + bf16 embeddings/lm_head + LoRA grads +
  # activations push past T4 capacity (transformers tries CPU offload, bnb
  # rejects). Switch to gemma-4-e4b on A100/L4 (Colab Pro).
  model: gemma-4-e2b
  quantization: 4bit
  lora:
    r: 16
    alpha: 32
    dropout: 0.05

training:
  # v4 setup (LLM-only LoRA, post-mortem of v3): vision_tower untouched, so
  # the activation footprint shrinks vs v3 — A100/L4 can run batch=2 with
  # max_length=1024 (covers full receipt+answer). Effective batch stays 16.
  # 5 epochs based on v2 plateau curve; early_stopping_patience adds a guard.
  epochs: 5
  batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-4
  max_length: 1024
  bf16: true
  fp16: false
  gradient_checkpointing: true
  logging_steps: 5
  report_to: wandb
  early_stopping_patience: 2
  checkpoint_dir: /content/drive/MyDrive/bill_and_meal/checkpoints_v4
  output_dir: /content/drive/MyDrive/bill_and_meal/outputs_v4

wandb:
  project: bill-and-meal
  run_name_prefix: colab
